name: Release

on:
  push:
    branches:
      - main

# Only one release job at a time — prevents races when commits land quickly.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # push version-bump commit + create release/tag
  issues: write          # comment on issues referenced in commits
  pull-requests: write   # comment on PRs referenced in commits
  id-token: write        # OIDC (future PyPI trusted publishing)

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      # full history is required so semantic-release can walk commits
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT when available so the version-bump commit can bypass
          # branch protection rules that block the default GITHUB_TOKEN.
          # Add a repo secret named RELEASE_TOKEN (classic PAT, repo scope)
          # to enable this. Falls back to GITHUB_TOKEN if the secret is absent.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # Optional: upload build artefacts to the release
      # Uncomment and adjust if you start packaging imap-cli as a wheel/sdist.
      # -----------------------------------------------------------------------
